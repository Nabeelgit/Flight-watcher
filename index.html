<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Watcher</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">

    <script src="./script.js" defer></script>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <img src="./assets/aircraft-silhouette.png" class="plane-bg" alt="">

    <div class="container">

        <h1>FLIGHT WATCHER</h1>

        <button id="camera-btn">ACCESS RADAR</button>

        <p id="status" class="status-line"></p>

        <div id="results">
            <div class="results-header">
                <h2>TARGET DATA</h2>
                <span id="lock-label">STANDBY</span>
            </div>

            <div class="route-display" id="val-route">— · —</div>

            <div class="data-line">
                <span>Flight</span>
                <span id="val-flight">---</span>
            </div>
            <div class="data-line">
                <span>Aircraft</span>
                <span id="val-aircraft">---</span>
            </div>
            <div class="data-line">
                <span>Altitude</span>
                <span id="val-altitude">---</span>
            </div>
            <div class="data-line">
                <span>Speed</span>
                <span id="val-speed">---</span>
            </div>
            <div class="data-line">
                <span>Distance</span>
                <span id="val-distance">---</span>
            </div>
        </div>

    </div>

    <!-- ── Debug HUD — fixed to bottom of screen, tap to collapse ── -->
    <div id="debug">
        <div id="debug-toggle">DEBUG</div>
        <div class="debug-rows">
            <div class="debug-row">
                <span>Heading</span>
                <span id="dbg-heading">—</span>
            </div>
            <div class="debug-row">
                <span>Pitch (β)</span>
                <span id="dbg-pitch">—</span>
            </div>
            <div class="debug-row">
                <span>Aircraft</span>
                <span id="dbg-count">—</span>
            </div>
            <div class="debug-row">
                <span>Last fetch</span>
                <span id="dbg-fetch">—</span>
            </div>
            <div class="debug-row">
                <span>Worker resp</span>
                <span id="dbg-raw">—</span>
            </div>
        </div>
    </div>

    <script>
        // Tap debug panel to collapse/expand
        document.getElementById("debug").addEventListener("click", () => {
            document.getElementById("debug").classList.toggle("collapsed");
        });
    </script>

</body>
</html>
