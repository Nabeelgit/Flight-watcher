<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="HandheldFriendly" content="true">
    <title>Flight Watcher</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">

    <!-- aircraft-types loaded normally; TF.js loaded on demand when camera opens -->
    <script src="./aircraft-types.js" defer></script>
    <script src="./script.js" defer></script>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <img src="./assets/aircraft-silhouette.png" class="plane-bg" alt="">

    <div class="container">

        <h1>FLIGHT WATCHER</h1>

        <div class="top-buttons">
            <button id="radar-btn">ACCESS RADAR</button>
            <button id="open-camera-btn">CAMERA</button>
        </div>

        <p id="status" class="status-line"></p>

        <div id="results" title="Tap to manually lock/unlock target">
            <div class="results-header">
                <h2>TARGET DATA</h2>
                <span id="lock-label">STANDBY</span>
            </div>

            <div class="route-display" id="val-route">---</div>
            <div class="route-display" id="val-origin-dest" style="font-size:.85rem; opacity:.8;">---</div>

            <div class="data-line">
                <span>Flight</span>
                <span id="val-flight">---</span>
            </div>
            <div class="data-line">
                <span>Aircraft</span>
                <span id="val-aircraft">---</span>
            </div>
            <div class="data-line secondary">
                <span>Hex</span>
                <span id="val-hex">---</span>
            </div>
            <div class="data-line">
                <span>Altitude</span>
                <span id="val-altitude">---</span>
            </div>
            <div class="data-line">
                <span>Speed</span>
                <span id="val-speed">---</span>
            </div>
            <div class="data-line">
                <span>Distance</span>
                <span id="val-distance">---</span>
            </div>

            <div id="manual-controls">
                <button id="lock-btn">LOCK TARGET</button>
            </div>
        </div>

    </div>

    <!-- ══ CAMERA OVERLAY ══════════════════════════════════════════════════ -->
    <div id="camera-overlay">

        <!-- Model loading screen — shown until COCO-SSD is ready -->
        <div id="model-loading">
            <p id="model-loading-text">LOADING MODEL...</p>
            <div id="model-progress-track">
                <div id="model-progress-fill"></div>
            </div>
            <p id="model-progress-pct">0%</p>
        </div>

        <!-- Live feed — hidden until model ready -->
        <video id="camera-feed" autoplay playsinline muted></video>

        <!-- Future: detection canvas -->
        <canvas id="detection-canvas"></canvas>

        <!-- X — top right -->
        <button id="close-camera-btn">X</button>

        <!-- Zoom controls — under X -->
        <div id="zoom-controls">
            <button id="zoom-in-btn">+</button>
            <button id="zoom-out-btn">-</button>
        </div>

        <!-- Flight info overlay — top left, shown on detect or manual identify -->
        <div id="camera-info" class="hidden">
            <p id="cam-aircraft"></p>
            <p id="cam-airline"></p>
            <p id="cam-route"></p>
            <p id="cam-speed"></p>
        </div>

        <!-- Shutter + Identify — float above the image bar -->
        <button id="shutter-btn"></button>
        <button id="identify-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                <path d="M320 48C337.7 48 352 62.3 352 80L352 98.3C450.1 112.3 527.7 189.9 541.7 288L560 288C577.7 288 592 302.3 592 320C592 337.7 577.7 352 560 352L541.7 352C527.7 450.1 450.1 527.7 352 541.7L352 560C352 577.7 337.7 592 320 592C302.3 592 288 577.7 288 560L288 541.7C189.9 527.7 112.3 450.1 98.3 352L80 352C62.3 352 48 337.7 48 320C48 302.3 62.3 288 80 288L98.3 288C112.3 189.9 189.9 112.3 288 98.3L288 80C288 62.3 302.3 48 320 48zM163.2 352C175.9 414.7 225.3 464.1 288 476.8L288 464C288 446.3 302.3 432 320 432C337.7 432 352 446.3 352 464L352 476.8C414.7 464.1 464.1 414.7 476.8 352L464 352C446.3 352 432 337.7 432 320C432 302.3 446.3 288 464 288L476.8 288C464.1 225.3 414.7 175.9 352 163.2L352 176C352 193.7 337.7 208 320 208C302.3 208 288 193.7 288 176L288 163.2C225.3 175.9 175.9 225.3 163.2 288L176 288C193.7 288 208 302.3 208 320C208 337.7 193.7 352 176 352L163.2 352zM320 272C346.5 272 368 293.5 368 320C368 346.5 346.5 368 320 368C293.5 368 272 346.5 272 320C272 293.5 293.5 272 320 272z"/>
            </svg>
        </button>

        <!-- Image bar — fixed to bottom -->
        <div id="camera-bar">
            <p id="camera-bar-hint">Images taken will appear here</p>
            <div id="photo-strip"></div>
        </div>

    </div>

    <!-- ── Debug HUD ── -->
    <div id="debug" class="collapsed">
        <div id="debug-toggle">DEBUG</div>
        <div class="debug-rows">
            <div class="debug-row">
                <span>Heading</span>
                <span id="dbg-heading">-</span>
            </div>
            <div class="debug-row">
                <span>Pitch (b)</span>
                <span id="dbg-pitch">-</span>
            </div>
            <div class="debug-row">
                <span>Aircraft</span>
                <span id="dbg-count">-</span>
            </div>
            <div class="debug-row">
                <span>Last fetch</span>
                <span id="dbg-fetch">-</span>
            </div>
            <div class="debug-row">
                <span>Worker resp</span>
                <span id="dbg-raw">-</span>
            </div>
        </div>
    </div>

    <script>
        document.getElementById("debug").addEventListener("click", () => {
            document.getElementById("debug").classList.toggle("collapsed");
        });
    </script>

</body>
</html>
