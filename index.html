<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Watcher</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">

    <script src="./script.js" defer></script>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <img src="./assets/aircraft-silhouette.png" class="plane-bg" alt="">

    <div class="container">

        <h1>FLIGHT WATCHER</h1>

        <button id="camera-btn">
            ACCESS CAMERA
        </button>

        <div id="results">
            <h2>TARGET DATA</h2>

            <div class="route-display">
                Origin → Destination
            </div>

            <div class="data-line">
                <span>Flight:</span>
                <span>---</span>
            </div>

            <div class="data-line">
                <span>Aircraft:</span>
                <span>---</span>
            </div>

            <div class="data-line">
                <span>Altitude:</span>
                <span>---</span>
            </div>

            <div class="data-line">
                <span>Speed:</span>
                <span>---</span>
            </div>
        </div>

    </div>

</body>
</html>
