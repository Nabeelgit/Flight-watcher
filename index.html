<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Watcher</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">

    <!-- TensorFlow.js + COCO-SSD — self-hosted in assets/ -->
    <script src="./assets/tf.min.js" defer></script>
    <script src="./assets/coco-ssd.min.js" defer></script>
    <script src="./aircraft-types.js" defer></script>
    <script src="./script.js" defer></script>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <img src="./assets/aircraft-silhouette.png" class="plane-bg" alt="">

    <div class="container">

        <h1>FLIGHT WATCHER</h1>

        <div class="top-buttons">
            <button id="radar-btn">ACCESS RADAR</button>
            <button id="open-camera-btn">CAMERA</button>
        </div>

        <p id="status" class="status-line"></p>

        <div id="results" title="Tap to manually lock/unlock target">
            <div class="results-header">
                <h2>TARGET DATA</h2>
                <span id="lock-label">STANDBY</span>
            </div>

            <div class="route-display" id="val-route">---</div>
            <div class="route-display" id="val-origin-dest" style="font-size:.85rem; opacity:.8;">---</div>

            <div class="data-line">
                <span>Flight</span>
                <span id="val-flight">---</span>
            </div>
            <div class="data-line">
                <span>Aircraft</span>
                <span id="val-aircraft">---</span>
            </div>
            <div class="data-line secondary">
                <span>Hex</span>
                <span id="val-hex">---</span>
            </div>
            <div class="data-line">
                <span>Altitude</span>
                <span id="val-altitude">---</span>
            </div>
            <div class="data-line">
                <span>Speed</span>
                <span id="val-speed">---</span>
            </div>
            <div class="data-line">
                <span>Distance</span>
                <span id="val-distance">---</span>
            </div>

            <div id="manual-controls">
                <button id="lock-btn">LOCK TARGET</button>
            </div>
        </div>

    </div>

    <!-- ══ CAMERA OVERLAY ══════════════════════════════════════════════════ -->
    <div id="camera-overlay">

        <!-- Model loading screen — shown until COCO-SSD is ready -->
        <div id="model-loading">
            <p id="model-loading-text">LOADING MODEL...</p>
            <div id="model-progress-track">
                <div id="model-progress-fill"></div>
            </div>
            <p id="model-progress-pct">0%</p>
        </div>

        <!-- Live feed — hidden until model ready -->
        <video id="camera-feed" autoplay playsinline muted></video>

        <!-- Future: detection canvas -->
        <canvas id="detection-canvas"></canvas>

        <!-- X — top right -->
        <button id="close-camera-btn">X</button>

        <!-- Shutter — floats above the image bar -->
        <button id="shutter-btn"></button>

        <!-- Image bar — fixed to bottom -->
        <div id="camera-bar">
            <p id="camera-bar-hint">Images taken will appear here</p>
            <div id="photo-strip"></div>
        </div>

    </div>

    <!-- ── Debug HUD ── -->
    <div id="debug" class="collapsed">
        <div id="debug-toggle">DEBUG</div>
        <div class="debug-rows">
            <div class="debug-row">
                <span>Heading</span>
                <span id="dbg-heading">-</span>
            </div>
            <div class="debug-row">
                <span>Pitch (b)</span>
                <span id="dbg-pitch">-</span>
            </div>
            <div class="debug-row">
                <span>Aircraft</span>
                <span id="dbg-count">-</span>
            </div>
            <div class="debug-row">
                <span>Last fetch</span>
                <span id="dbg-fetch">-</span>
            </div>
            <div class="debug-row">
                <span>Worker resp</span>
                <span id="dbg-raw">-</span>
            </div>
        </div>
    </div>

    <script>
        document.getElementById("debug").addEventListener("click", () => {
            document.getElementById("debug").classList.toggle("collapsed");
        });
    </script>

</body>
</html>
